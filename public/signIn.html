<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In | Expense Tracker</title>
  <script>if (localStorage.getItem('theme') === 'dark') document.documentElement.classList.add('dark');</script>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/tailwind.output.css" />
  <link rel="stylesheet" href="/css/app.css" />
  <script defer src="/js/toast.js"></script>
  <script defer src="/js/theme.js"></script>
  <script defer src="/js/signIn.js"></script>
</head>
<body class="bg-[#2a2d3e] dark:bg-gray-950 min-h-screen flex items-center justify-center font-sans">

  <!-- Dark mode toggle -->
  <button id="darkToggle" class="fixed top-4 right-4 p-2 rounded-lg bg-white/10 hover:bg-white/20 text-white text-lg transition hover:scale-110" title="Toggle dark mode">🌙</button>

  <div class="bg-[#1e1f2b] dark:bg-gray-900 rounded-2xl shadow-2xl p-8 w-full max-w-md border border-white/10">

    <!-- Nav -->
    <div class="flex justify-between items-center mb-8 text-sm">
      <a href="/" class="text-gray-400 hover:text-white transition">Home</a>
      <a href="/api/users/signup" class="text-blue-400 hover:text-blue-300 font-medium transition">Create account →</a>
    </div>

    <p class="text-gray-400 text-xs font-semibold tracking-widest uppercase mb-1">Welcome back</p>
    <h1 class="text-2xl font-bold text-white mb-8">Sign in to your account</h1>

    <form id="signinForm" class="space-y-4">
      <input
        type="email"
        name="email"
        placeholder="Email address"
        required
        class="w-full bg-[#2d2f40] dark:bg-gray-800 text-white placeholder-gray-500 border border-white/10 rounded-xl px-4 py-3 text-sm outline-none focus:border-blue-500 transition"
      />
      <input
        type="password"
        name="password"
        placeholder="Password"
        required
        class="w-full bg-[#2d2f40] dark:bg-gray-800 text-white placeholder-gray-500 border border-white/10 rounded-xl px-4 py-3 text-sm outline-none focus:border-blue-500 transition"
      />

      <label class="flex items-center gap-2 text-gray-400 text-sm cursor-pointer select-none">
        <input type="checkbox" name="rememberMe" class="w-4 h-4 accent-blue-500" />
        Remember me
      </label>

      <button
        type="submit"
        id="login_btn"
        class="w-full bg-blue-600 hover:bg-blue-700 disabled:opacity-50 text-white font-semibold py-3 rounded-xl text-sm transition"
      >
        Log In
      </button>
    </form>

  </div>
</body>
</html>
