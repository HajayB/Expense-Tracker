<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Transactions | Expense Tracker</title>
  <script>if (localStorage.getItem('theme') === 'dark') document.documentElement.classList.add('dark');</script>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/tailwind.output.css" />
  <link rel="stylesheet" href="/css/app.css" />
  <script defer src="/js/toast.js"></script>
  <script defer src="/js/theme.js"></script>
  <script defer src="/js/transactions.js"></script>
</head>
<body class="bg-gray-50 dark:bg-gray-900 text-gray-800 dark:text-gray-100 font-sans">

  <!-- Mobile hamburger -->
  <button id="hamburger" class="md:hidden fixed top-4 left-4 z-50 bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 p-2 rounded-lg shadow-sm">
    <svg class="w-5 h-5 text-gray-600 dark:text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
    </svg>
  </button>

  <!-- Mobile overlay -->
  <div id="overlay" class="hidden fixed inset-0 bg-black/40 z-40 md:hidden"></div>

  <div class="min-h-screen">

    <!-- Sidebar -->
    <aside id="sidebar" class="fixed top-0 left-0 h-screen w-60 bg-white dark:bg-gray-800 border-r border-gray-200 dark:border-gray-700 flex flex-col justify-between p-4 overflow-y-auto -translate-x-full md:translate-x-0 transition-transform duration-300 ease-in-out z-50">
      <div>
        <div class="flex items-center justify-between mb-8 mt-2">
          <span class="text-3xl">💰</span>
          <button id="closeSidebar" class="md:hidden text-gray-400 hover:text-gray-600 dark:hover:text-gray-200 text-xl leading-none">✕</button>
        </div>
        <nav>
          <ul class="space-y-1">
            <li id="dashboard" class="flex items-center gap-3 px-3 py-2.5 rounded-xl cursor-pointer text-gray-600 dark:text-gray-300 hover:bg-blue-50 dark:hover:bg-gray-700 text-sm transition-colors">
              <span>🏠</span> Dashboard
            </li>
            <li id="transationBtn" class="flex items-center gap-3 px-3 py-2.5 rounded-xl cursor-pointer bg-blue-600 text-white font-semibold text-sm">
              <span>📋</span> Transactions
            </li>
            <li id="categoriesBtn" class="flex items-center gap-3 px-3 py-2.5 rounded-xl cursor-pointer text-gray-600 dark:text-gray-300 hover:bg-blue-50 dark:hover:bg-gray-700 text-sm transition-colors">
              <span>🗂️</span> Categories
            </li>
            <li id="summaryBtn" class="flex items-center gap-3 px-3 py-2.5 rounded-xl cursor-pointer text-gray-600 dark:text-gray-300 hover:bg-blue-50 dark:hover:bg-gray-700 text-sm transition-colors">
              <span>📊</span> Summary
            </li>
          </ul>
        </nav>
      </div>
      <ul>
        <li id="logoutBtn" class="flex items-center gap-3 px-3 py-2.5 rounded-xl cursor-pointer text-gray-500 dark:text-gray-400 hover:bg-red-50 dark:hover:bg-red-900/20 hover:text-red-600 dark:hover:text-red-400 text-sm transition-colors">
          <span>🚪</span> Logout
        </li>
      </ul>
    </aside>

    <!-- Main Content -->
    <main class="md:ml-60 p-4 md:p-8 pt-16 md:pt-8 fade-in">

      <!-- Top bar -->
      <div class="flex items-center justify-between mb-8 ml-8 md:ml-0">
        <h1 id="welcome_text" class="text-xl font-bold truncate"></h1>
        <button id="darkToggle" class="ml-4 p-2 rounded-lg bg-gray-100 dark:bg-gray-700 hover:bg-gray-200 dark:hover:bg-gray-600 transition text-lg flex-shrink-0" title="Toggle dark mode">🌙</button>
      </div>

      <!-- Add Transaction form -->
      <div class="add-transaction bg-white dark:bg-gray-800 rounded-2xl shadow-sm border border-gray-100 dark:border-gray-700 p-6 mb-6">
        <h2 class="text-sm font-semibold text-gray-700 dark:text-gray-200 mb-4">Add Transaction</h2>
        <form id="transactionForm">
          <div class="flex flex-col sm:flex-row gap-3 mb-3">
            <input
              type="number"
              name="amount"
              placeholder="Amount"
              required
              class="flex-1 bg-gray-50 dark:bg-gray-700 border border-gray-200 dark:border-gray-600 rounded-xl px-4 py-2.5 text-sm outline-none focus:border-blue-500 dark:text-gray-100 dark:placeholder-gray-400 transition"
            />
            <select
              name="type"
              required
              class="flex-1 bg-gray-50 dark:bg-gray-700 border border-gray-200 dark:border-gray-600 rounded-xl px-4 py-2.5 text-sm outline-none focus:border-blue-500 dark:text-gray-100 transition"
            >
              <option value="income">Income</option>
              <option value="expense">Expense</option>
            </select>
            <select
              name="category"
              required
              class="flex-1 bg-gray-50 dark:bg-gray-700 border border-gray-200 dark:border-gray-600 rounded-xl px-4 py-2.5 text-sm outline-none focus:border-blue-500 dark:text-gray-100 transition"
            >
              <option value="" disabled selected>Category</option>
            </select>
          </div>
          <textarea
            name="description"
            placeholder="Note (optional)"
            rows="2"
            class="w-full bg-gray-50 dark:bg-gray-700 border border-gray-200 dark:border-gray-600 rounded-xl px-4 py-2.5 text-sm outline-none focus:border-blue-500 dark:text-gray-100 dark:placeholder-gray-400 transition resize-none mb-3"
          ></textarea>
          <button
            type="submit"
            class="bg-blue-600 hover:bg-blue-700 text-white font-semibold px-6 py-2.5 rounded-xl text-sm transition"
          >
            Add Transaction
          </button>
        </form>
      </div>

      <!-- Filter bar -->
      <div class="filter-bar mb-6">
        <input type="text" id="filterSearch" placeholder="Search description or category…" />
        <select id="filterType">
          <option value="">All Types</option>
          <option value="income">Income</option>
          <option value="expense">Expense</option>
        </select>
        <input type="date" id="filterStart" />
        <input type="date" id="filterEnd" />
        <button id="clearFilters" class="btn-clear-filters">Clear</button>
      </div>

      <!-- Transactions list -->
      <div class="transactions bg-white dark:bg-gray-800 rounded-2xl shadow-sm border border-gray-100 dark:border-gray-700 overflow-hidden">
        <div class="px-6 py-4 border-b border-gray-100 dark:border-gray-700">
          <h2 class="font-semibold text-gray-700 dark:text-gray-200 text-sm">Transactions</h2>
        </div>
        <div class="overflow-x-auto">
          <table class="data-table">
            <thead>
              <tr>
                <th>Date</th>
                <th>Amount</th>
                <th>Type</th>
                <th>Category</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody>
              <tr><td colspan="5" class="text-center text-gray-400 py-10">Loading...</td></tr>
            </tbody>
          </table>
        </div>

        <!-- Pagination -->
        <div class="pagination" id="paginationControls">
          <button id="prevPage" disabled>&#8592; Prev</button>
          <span id="pageInfo">Page 1</span>
          <button id="nextPage">Next &#8594;</button>
        </div>
      </div>

    </main>
  </div>

  <!-- Delete Confirm Modal -->
  <div id="deleteModal" class="modal">
    <div class="modal-content">
      <h2>Delete Transaction</h2>
      <p style="margin:8px 0 20px;color:#6b7280;font-size:0.875rem">Are you sure you want to delete this transaction? This cannot be undone.</p>
      <div class="modal-btn-row">
        <button id="cancelDelete" class="btn-cancel">Cancel</button>
        <button id="confirmDelete" class="btn-danger">Delete</button>
      </div>
    </div>
  </div>

  <!-- Edit Transaction Modal -->
  <div id="editModal" class="modal">
    <div class="modal-content">
      <span class="close">&times;</span>
      <h2>Edit Transaction</h2>
      <form id="editForm">
        <input type="hidden" name="id" />

        <label>Amount</label>
        <input type="number" name="amount" required />

        <label>Type</label>
        <select name="type" required>
          <option value="income">Income</option>
          <option value="expense">Expense</option>
        </select>

        <label>Category</label>
        <select name="category" required>
          <option value="" disabled selected>Select category</option>
        </select>

        <label>Description</label>
        <textarea name="description" rows="2"></textarea>

        <button type="submit" class="save">Save Changes</button>
      </form>
    </div>
  </div>

</body>
</html>
