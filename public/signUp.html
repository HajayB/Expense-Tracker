<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Create Account | Expense Tracker</title>
  <script>if (localStorage.getItem('theme') === 'dark') document.documentElement.classList.add('dark');</script>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/tailwind.output.css" />
  <link rel="stylesheet" href="/css/app.css" />
  <script defer src="/js/toast.js"></script>
  <script defer src="/js/theme.js"></script>
  <script defer src="/js/signup.js"></script>
</head>
<body class="bg-[#2a2d3e] dark:bg-gray-950 min-h-screen flex items-center justify-center font-sans">

  <!-- Dark mode toggle -->
  <button id="darkToggle" class="fixed top-4 right-4 p-2 rounded-lg bg-white/10 hover:bg-white/20 text-white text-lg transition hover:scale-110" title="Toggle dark mode">🌙</button>

  <div class="bg-[#1e1f2b] dark:bg-gray-900 rounded-2xl shadow-2xl p-8 w-full max-w-md border border-white/10">

    <!-- Nav -->
    <div class="flex justify-between items-center mb-8 text-sm">
      <a href="/" class="text-gray-400 hover:text-white transition">Home</a>
      <a href="/api/users/signin" class="text-blue-400 hover:text-blue-300 font-medium transition">Sign in →</a>
    </div>

    <p class="text-gray-400 text-xs font-semibold tracking-widest uppercase mb-1">Start for free</p>
    <h1 class="text-2xl font-bold text-white mb-1">Create new account<span class="text-blue-500">.</span></h1>
    <p class="text-gray-500 text-sm mb-8">Already have an account? <a href="/api/users/signin" class="text-blue-400 hover:text-blue-300 transition">Sign in</a></p>

    <form class="space-y-4">
      <div class="flex gap-3">
        <input
          type="text"
          name="firstname"
          placeholder="First name"
          required
          class="w-full bg-[#2d2f40] dark:bg-gray-800 text-white placeholder-gray-500 border border-white/10 rounded-xl px-4 py-3 text-sm outline-none focus:border-blue-500 transition"
        />
        <input
          type="text"
          name="lastname"
          placeholder="Last name"
          required
          class="w-full bg-[#2d2f40] dark:bg-gray-800 text-white placeholder-gray-500 border border-white/10 rounded-xl px-4 py-3 text-sm outline-none focus:border-blue-500 transition"
        />
      </div>
      <input
        type="email"
        name="email"
        placeholder="Email address"
        required
        class="w-full bg-[#2d2f40] dark:bg-gray-800 text-white placeholder-gray-500 border border-white/10 rounded-xl px-4 py-3 text-sm outline-none focus:border-blue-500 transition"
      />
      <input
        type="password"
        name="password"
        placeholder="Password (min 6 characters)"
        required
        class="w-full bg-[#2d2f40] dark:bg-gray-800 text-white placeholder-gray-500 border border-white/10 rounded-xl px-4 py-3 text-sm outline-none focus:border-blue-500 transition"
      />

      <button
        type="submit"
        class="create-account w-full bg-gradient-to-r from-blue-500 to-blue-700 hover:opacity-90 text-white font-semibold py-3 rounded-xl text-sm transition"
      >
        Create Account
      </button>
    </form>

  </div>
</body>
</html>
